version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: itpm-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: itpm
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - itpm-network

  backend:
    image: openjdk:17-jdk-slim
    container_name: itpm-backend
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/itpm?useUnicode=true&characterEncoding=utf-8&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    volumes:
      - ./backend:/app
    working_dir: /app
    command: mvn spring-boot:run
    networks:
      - itpm-network

  frontend:
    image: node:18
    container_name: itpm-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    networks:
      - itpm-network

volumes:
  mysql_data:

networks:
  itpm-network:
    driver: bridge
